name: Deploy Mateusz Apps hub

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mateusz-apps-hub-production
  cancel-in-progress: true

env:
  ORACLE_HOST: ${{ vars.ORACLE_HOST || '79.72.79.130' }}
  ORACLE_USER: ${{ vars.ORACLE_USER || 'opc' }}
  ORACLE_SSH_PORT: ${{ vars.ORACLE_SSH_PORT || '22' }}
  PUBLIC_PORT: ${{ vars.PUBLIC_PORT || '8080' }}
  THOUGHTS_PORT: ${{ vars.THOUGHTS_PORT || '8082' }}
  TOFUFU_PORT: ${{ vars.TOFUFU_PORT || '8083' }}
  APP_ROOT: /opt/mateusz-apps

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Verify static hub
        run: python3 -m unittest discover -s tests

      - name: Configure SSH
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_KNOWN_HOSTS: ${{ secrets.ORACLE_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${ORACLE_SSH_KEY:?Missing ORACLE_SSH_KEY repository secret}"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$ORACLE_SSH_KEY" > "$HOME/.ssh/oracle_deploy_key"
          chmod 600 "$HOME/.ssh/oracle_deploy_key"
          if [ -n "${ORACLE_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$ORACLE_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "$ORACLE_SSH_PORT" "$ORACLE_HOST" >> "$HOME/.ssh/known_hosts"
          fi

      - name: Copy link hub
        run: |
          tar -czf /tmp/mateusz-link-hub.tar.gz public
          scp -P "$ORACLE_SSH_PORT" -i "$HOME/.ssh/oracle_deploy_key" \
            shared_site_router.py deploy/nginx.conf.template \
            systemd/mateusz-apps-certbot-renew.service \
            systemd/mateusz-apps-certbot-renew.timer \
            /tmp/mateusz-link-hub.tar.gz \
            "$ORACLE_USER@$ORACLE_HOST:/tmp/"

      - name: Install and restart hub router
        run: |
          ssh -p "$ORACLE_SSH_PORT" -i "$HOME/.ssh/oracle_deploy_key" "$ORACLE_USER@$ORACLE_HOST" \
            "PUBLIC_PORT='$PUBLIC_PORT' THOUGHTS_PORT='$THOUGHTS_PORT' TOFUFU_PORT='$TOFUFU_PORT' APP_ROOT='$APP_ROOT' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail
          hub_root="$APP_ROOT/hub"
          master_root="$APP_ROOT/master-compounder/current"
          sudo mkdir -p "$hub_root" "$master_root"
          sudo rm -rf "$hub_root/public"
          sudo tar -xzf /tmp/mateusz-link-hub.tar.gz -C "$hub_root"
          sudo install -m 0755 /tmp/shared_site_router.py "$hub_root/router.py"
          sudo chown -R root:root "$hub_root"

          # One-time compatibility migration from the pre-namespace CV path.
          if ! sudo test -f "$master_root/index.html" && sudo test -f /home/$USER/master_compounder_web/index.html; then
            sudo cp -a /home/$USER/master_compounder_web/. "$master_root/"
          fi

          cat > /tmp/mateusz-apps-hub.service <<EOF
          [Unit]
          Description=Mateusz Apps hub and route gateway
          After=network.target podman.service
          Requires=podman.service

          [Service]
          Type=simple
          User=$USER
          Environment=APP_ROOT=$APP_ROOT
          Environment=PUBLIC_PORT=$PUBLIC_PORT
          Environment=LANDING_ROOT=$hub_root/public
          Environment=THOUGHTS_HOST=127.0.0.1
          Environment=THOUGHTS_PORT=$THOUGHTS_PORT
          Environment=MASTER_PREFIX=/master-compounder
          Environment=LEGACY_MASTER_PREFIX=/master_compounder
          Environment=MASTER_ROOT=$master_root
          Environment=TOFUFU_PREFIX=/tofufu
          Environment=TOFUFU_HOST=127.0.0.1
          Environment=TOFUFU_PORT=$TOFUFU_PORT
          ExecStart=/usr/bin/python3 $hub_root/router.py
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
          EOF
          sudo install -m 0644 /tmp/mateusz-apps-hub.service /etc/systemd/system/mateusz-apps-hub.service
          sudo systemctl daemon-reload
          sudo systemctl disable --now shared-sites.service >/dev/null 2>&1 || true
          sudo systemctl enable mateusz-apps-hub.service
          if ! sudo systemctl restart mateusz-apps-hub.service; then
            sudo systemctl enable --now shared-sites.service >/dev/null 2>&1 || true
            exit 1
          fi
          sleep 2
          curl --fail "http://127.0.0.1:$PUBLIC_PORT/" | grep -F 'Mateusz Dwornikiewicz' >/dev/null
          curl --fail --head --max-time 10 "http://127.0.0.1:$PUBLIC_PORT/master-compounder/"
          curl --fail --head --max-time 10 "http://127.0.0.1:$PUBLIC_PORT/master_compounder/" \
            | grep -Fi 'location: /master-compounder/' >/dev/null

          if sudo test -f "/etc/letsencrypt/live/$ORACLE_HOST/fullchain.pem"; then
            sed -e "s/__PUBLIC_HOST__/$ORACLE_HOST/g" -e "s/__PUBLIC_PORT__/$PUBLIC_PORT/g" \
              /tmp/nginx.conf.template > /tmp/mateusz-apps.conf
            sudo cp -a /etc/nginx/conf.d/tofufu-ip-https.conf /tmp/tofufu-ip-https.conf.backup 2>/dev/null || true
            sudo rm -f /etc/nginx/conf.d/tofufu-ip-https.conf
            sudo install -m 0644 /tmp/mateusz-apps.conf /etc/nginx/conf.d/mateusz-apps.conf
            if ! sudo nginx -t; then
              sudo rm -f /etc/nginx/conf.d/mateusz-apps.conf
              sudo cp -a /tmp/tofufu-ip-https.conf.backup /etc/nginx/conf.d/tofufu-ip-https.conf 2>/dev/null || true
              exit 1
            fi
            sudo systemctl reload nginx
            sudo install -m 0644 /tmp/mateusz-apps-certbot-renew.service /etc/systemd/system/mateusz-apps-certbot-renew.service
            sudo install -m 0644 /tmp/mateusz-apps-certbot-renew.timer /etc/systemd/system/mateusz-apps-certbot-renew.timer
            sudo systemctl disable --now tofufu-certbot-renew.timer >/dev/null 2>&1 || true
            sudo systemctl daemon-reload
            sudo systemctl enable --now mateusz-apps-certbot-renew.timer
          fi
          REMOTE_SCRIPT

      - name: Verify public hub
        run: |
          curl --fail --max-time 20 "http://$ORACLE_HOST:$PUBLIC_PORT/" | grep -F 'Mateusz Dwornikiewicz' >/dev/null
          curl --fail --head --max-time 20 "http://$ORACLE_HOST:$PUBLIC_PORT/master-compounder/"
